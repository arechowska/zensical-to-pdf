# PDF settings — copy this file to your project's tools/ and edit as needed.

# Font name (must be installed on the system; falls back to Liberation Sans if not found)
mainfont: "Arial"

# Page margins
geometry-left: "2cm"
geometry-right: "2cm"
geometry-top: "2.5cm"
geometry-bottom: "2.5cm"

# Headers
header-left: "User Guide"
header-right: "Organization Name"

# Table of contents depth (1 = sections only, 2 = sections + subsections)
toc-depth: 2

# Cover page
cover-title: "User Guide"
cover-subtitle: "Product Name"
cover-org: "Organization Name"
cover-date: "2026"
